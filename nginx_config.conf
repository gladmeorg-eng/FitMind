# ============================================================
# FILE: nginx/nginx.conf
# Production Nginx Configuration for FitMind AI
# Handles SSL, rate limiting, load balancing
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=50r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream backends
    upstream web_backend {
        least_conn;
        server web:3000 max_fails=3 fail_timeout=30s;
        # Add more web instances for scaling:
        # server web2:3000 max_fails=3 fail_timeout=30s;
        # server web3:3000 max_fails=3 fail_timeout=30s;
    }

    upstream api_backend {
        least_conn;
        server ai-engine:8000 max_fails=3 fail_timeout=30s;
        # Add more API instances for scaling:
        # server ai-engine2:8000 max_fails=3 fail_timeout=30s;
    }

    # ============================================================
    # HTTP → HTTPS Redirect
    # ============================================================
    server {
        listen 80;
        listen [::]:80;
        server_name fitmind.ai www.fitmind.ai app.fitmind.ai api.fitmind.ai;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # MAIN WEB DASHBOARD (fitmind.ai)
    # ============================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name fitmind.ai www.fitmind.ai;

        # SSL Certificates (Let's Encrypt)
        ssl_certificate /etc/nginx/ssl/live/fitmind.ai/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/fitmind.ai/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/live/fitmind.ai/chain.pem;

        # SSL Security
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.fitmind.ai https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com;" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Rate limiting for auth endpoints
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://web_backend;
            include /etc/nginx/proxy_params.conf;
        }

        # Main app
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://web_backend;
            include /etc/nginx/proxy_params.conf;

            # WebSocket support for real-time features
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static assets caching
        location /_next/static/ {
            proxy_pass http://web_backend;
            include /etc/nginx/proxy_params.conf;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /static/ {
            proxy_pass http://web_backend;
            include /etc/nginx/proxy_params.conf;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check
        location /health {
            access_log off;
            proxy_pass http://web_backend;
            include /etc/nginx/proxy_params.conf;
        }
    }

    # ============================================================
    # API SERVER (api.fitmind.ai)
    # ============================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.fitmind.ai;

        ssl_certificate /etc/nginx/ssl/live/api.fitmind.ai/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/api.fitmind.ai/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/live/api.fitmind.ai/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # CORS Headers for API
        add_header 'Access-Control-Allow-Origin' 'https://fitmind.ai' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' '86400' always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Stripe webhooks - higher rate limit, no auth required
        location /v3/gyms/{gym_id}/billing/webhooks/stripe {
            limit_req zone=webhook_limit burst=50 nodelay;
            proxy_pass http://api_backend;
            include /etc/nginx/proxy_params.conf;

            # Stripe needs raw body for signature verification
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_pass_request_headers on;
        }

        # API routes
        location /v3/ {
            limit_req zone=api_limit burst=100 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://api_backend;
            include /etc/nginx/proxy_params.conf;

            # Longer timeout for AI operations
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        # API Documentation (Swagger UI)
        location /docs {
            proxy_pass http://api_backend;
            include /etc/nginx/proxy_params.conf;
        }

        # Health check
        location /health {
            access_log off;
            proxy_pass http://api_backend;
            include /etc/nginx/proxy_params.conf;
        }
    }

    # ============================================================
    # MOBILE APP API (app.fitmind.ai)
    # Separate domain for mobile app with different CORS
    # ============================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name app.fitmind.ai;

        ssl_certificate /etc/nginx/ssl/live/app.fitmind.ai/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/app.fitmind.ai/privkey.pem;

        # CORS for mobile app
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        location /v3/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://api_backend;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 60s;
        }
    }

    # ============================================================
    # WEBSOCKET SERVER (ws.fitmind.ai)
    # Real-time features: live class updates, AI chat streaming
    # ============================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ws.fitmind.ai;

        ssl_certificate /etc/nginx/ssl/live/ws.fitmind.ai/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/ws.fitmind.ai/privkey.pem;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
